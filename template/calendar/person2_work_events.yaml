- trigger:
  - trigger: state
    entity_id: calendar.person2_work
  - trigger: time_pattern
    minutes: '/15'
  action:
  - action: calendar.get_events
    target:
      entity_id: calendar.person2_work
    data:
      start_date_time: "{{ today_at('00:00:00') }}"
      duration: 
        hours: 24
    response_variable: agenda
  sensor:
  - name: 'person2 work events'
    unique_id: 'person2_work_events'
    state: >-
      {%- set fms = namespace(events=[]) %}
      {%- for key, value in agenda.items() %}
        {%- for event in value.events if 'Reminder:' not in event["summary"] and event.start|as_datetime > now() %}
          {%- set fms.events = fms.events + [event] %}
        {%- endfor %}
      {%- endfor %}
      [{% for event in fms.events %}{% if not loop.first %},{% endif %}{ "start":"{{ event.start|as_timestamp()|timestamp_custom('%H:%M') }}", "summary":"{{event.summary}}" }{% endfor %}]
