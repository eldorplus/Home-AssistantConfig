id: 'office_dial_rotate'
initial_state: 'on'
alias: 'Office dial rotate'
triggers:
  - trigger: state
    entity_id: event.office_dial_moes_action
    to: ~
    id: event
conditions:
  - condition: or
    conditions:
      - condition: and
        conditions:
          - condition: trigger
            id: event
          - condition: template
            value_template: >-
              {{ trigger.to_state.attributes.event_type in ['volume_up','volume_down','next_track','prev_track'] }}
      - condition: template
        value_template: "{{ trigger.entity_id == 'sensor.office_dial_moes_action' }}"
variables:
  current_vol: "{{ state_attr('media_player.office','volume_level')|float(0) }}"
  vol_step: "{{ (trigger.to_state.attributes.action_step_size|float(12)/1000)|round(2) }}"
  new_vol: >-
    {{ (min(1,(current_vol|float(0)+vol_step|float(0))))|round(2) if (trigger.id == 'volume_up' or trigger.to_state.attributes.event_type == 'volume_up') else (max(0,(current_vol|float(0)-vol_step|float(0))))|round(2) }}
action:
  - service: notify.send_message
    target: 
      entity_id: notify.debug_log
    data:
      message: "Volume currently {{ current_vol }}, changing by {{ vol_step }} to {{ new_vol }}"
  - choose:
    - conditions:
      - condition: trigger
        id: 'volume_up'
      sequence:
      - service: media_player.volume_set
        data:
          entity_id: media_player.office
          volume_level: "{{ new_vol }}"
          #volume_level: "{{ min(1,state_attr('media_player.office','volume_level')|float(0)+(trigger.to_state.attributes.action_step_size|float(12)/1000)|round(2)) }}"
    - conditions:
      - condition: trigger
        id: 'volume_down'
      sequence:
      - service: media_player.volume_set
        data:
          entity_id: media_player.office
          volume_level: "{{ new_vol }}"
          #volume_level: "{{ max(0,state_attr('media_player.office','volume_level')|float(0)-(trigger.to_state.attributes.action_step_size|float(12)/1000)|round(2)) }}"
    - conditions:
      - condition: trigger
        id: 'next_track'
      sequence:
      - service: media_player.media_next_track
        data:
          entity_id: media_player.office
    - conditions:
      - condition: trigger
        id: 'prev_track'
      sequence:
      - service: media_player.media_previous_track
        data:
          entity_id: media_player.office
