id: 'office_dial_test'
alias: 'Office dial test'
trigger:
  - platform: state
    entity_id: event.office_dial_moes_action
    to: ~
action:
  - service: notify.send_message
    target: 
      entity_id: notify.debug_log
    data:
      message: >-
        From {{ trigger.from_state.state }}/{{ trigger.from_state.attributes.action }}/{{ trigger.from_state.attributes.event_type }} to {{ trigger.to_state.state }}/{{ trigger.to_state.attributes.action }}/{{ trigger.to_state.attributes.event_type }} - {{ trigger.to_state.attributes }}
