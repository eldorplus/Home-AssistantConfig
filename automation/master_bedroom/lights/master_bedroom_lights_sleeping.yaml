id: 'master_bedroom_lights_sleeping'
initial_state: 'on'
alias: 'Master bedroom lights sleeping'
trigger:
  - platform: state
    entity_id: input_select.master_bedroom
    to: 'Sleeping'
  - platform: state
    entity_id: input_select.house
    to: 'Sleeping'
condition:
  - condition: state
    entity_id: input_boolean.lighting_automations
    state: 'on'
  - condition: or
    conditions:
    - condition: state
      entity_id: input_select.master_bedroom
      state: 'Sleeping'
    - condition: and
      conditions:
      - condition: state
        entity_id: input_select.master_bedroom
        state: 'Auto'
      - condition: state
        entity_id: input_select.house
        state: 'Sleeping'
action:
  - service: light.turn_off
    data:
      entity_id: light.master_bedroom_bedhead
      transition: 5
  - service: switch.turn_off
    entity_id: 
    - switch.adaptive_lighting_adapt_brightness_master_bedroom
    - switch.adaptive_lighting_master_bedroom
    - switch.adaptive_lighting_sleep_mode_master_bedroom
  - service: select.select_option
    target:
      entity_id: select.wled_master_neon_preset
    data:
      option: Night
