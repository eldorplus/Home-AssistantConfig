id: 'garage_open_nobody_home'
alias: 'Garage open nobody home'
initial_state: 'on'
trigger:
  - platform: state
    entity_id: binary_sensor.garage_door_car_contact
    to: 'on'
condition:
  - condition: numeric_state
    entity_id: sensor.home_person2_distance
    below: 100
  - condition: state
    entity_id: binary_sensor.home_occupied
    state: 'off'
action:
  - action: notify.mobile_app_pixel_xl
    data:
      message: TTS
      data:
        media_stream: alarm_stream_max
        tts_text: "Nobody is home right now, turn off the alarm"
        priority: high
        ttl: 0
  - action: notify.mobile_app_pixel_xl
    data:
      title: "Nobody is home"
      message: "Nobody is home right now, turn off the alarm"
      data:
        car_ui: true
        notification_icon: "mdi:shield-home"
        channel: "car"
        importance: high
