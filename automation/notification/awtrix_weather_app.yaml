id: 'awtrix_weather_app'
alias: 'Awtrix weather app'
initial_state: 'on'
trigger:
  - platform: state
    entity_id: weather.tomorrow_io_home_nowcast
variables:
  temperature: >-
    {{ states('sensor.tomorrow_io_home_feels_like')|round(1,'half') }}{{ state_attr('sensor.tomorrow_io_home_feels_like','unit_of_measurement') }}
  colour: >-
    {% if states('sensor.tomorrow_io_home_feels_like')|round(1)|float <= 0 %}#7da5ff{% else %}#ffffff{% endif %}
  weather_icon: >-
    {% set weather_cond_day = ({
    "clear-night":"13345",
    "cloudy":"52159",
    "fog":"676",
    "hail":"53288",
    "lightning":"56676",
    "lightning-rainy":"56675",
    "partlycloudy":"2286",
    "pouring":"49300",
    "rainy":"2284",
    "snowy":"2289",
    "snowy-rainy":"49301",
    "sunny":"11201",
    "windy":"55032",
    "windy-variant":"56598",
    "exceptional":"16754"
    }) %}
    {% set weather_cond_night = ({
    "clear-night":"13345",
    "cloudy":"55707",
    "fog":"43741",
    "hail":"53288",
    "lightning":"56676",
    "lightning-rainy":"56675",
    "partlycloudy":"58532",
    "pouring":"26092",
    "rainy":"26092",
    "snowy":"26090",
    "snowy-rainy":"49301",
    "sunny":"18433",
    "windy":"56585",
    "windy-variant":"56585",
    "exceptional":"16754"
    }) %}
    {{ weather_cond_night[states('weather.tomorrow_io_home_nowcast')] if is_state('sun.sun','below_horizon') else weather_cond_day[states('weather.tomorrow_io_home_nowcast')] }}
action:
  - repeat:
      for_each:
        - '6d6f50'
        - 'living_room'
        - 'family_room'
      sequence:
        - service: 'awtrix.awtrix_{{ repeat.item }}_push_app_data'
          data:
            name: "weather"
            data:
              text: "{{ temperature }}"
              icon: "{{ weather_icon }}"
              gradient: ["{{ colour }}", "#FFFFFF#"]
              rainbow: false
              repeat: 2
              pushIcon: 1
              textCase: 0
              textOffset: 0
              lifetime: 1800
              lifetimeMode: 0
