id: 'power_cycle_loki'
alias: 'Power cycle loki'
initial_state: 'on'
triggers:
  - trigger: state
    entity_id: device_tracker.rpi_loki
    to: 'not_home'
    for: '00:10:00'
conditions:
  - condition: state
    entity_id: switch.cloudfree_usb_loki
    state: 'on'
actions:
  - action: switch.turn_off
    target:
      entity_id: switch.cloudfree_usb_loki
  - delay: '00:00:05'
  - action: switch.turn_on
    target:
      entity_id: switch.cloudfree_usb_loki
  - action: notify.discord_webhook
    data:
      message: "Loki was down for 10 minutes so we power cycled it"
