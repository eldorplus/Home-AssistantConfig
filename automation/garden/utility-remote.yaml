id: 'utility_remote'
alias: 'Utility remote'
description: 'Toggle the garden lights when the remote is operated. They can turn off at any time, but only turn on when the sun has set'
initial_state: 'on'
trigger:
  - platform: state
    entity_id: event.utility_remote_action
    to: ~
    id: 'event'
variables:
  action: >-
    {{ trigger.id if trigger.id != 'event' else trigger.to_state.attributes.event_type }}
action:
  - choose:
      # Toggle the lights if they were off, or this was a single press
      - conditions:
          - condition: or
            conditions:
              - condition: state
                entity_id: switch.garden_lights
                state: 'off'
              - condition: template
                value_template: "{{ action == 'single' }}"
        sequence:
          - alias: 'Toggle the lights'
            service: switch.toggle
            data:
              entity_id: switch.garden_lights
      - conditions:
          - condition: template
            value_template: "{{ action == 'double' }}"
        sequence:
          - alias: "Don't turn off the lights when we close the door"
            service: homeassistant.turn_off
            entity_id: automation.utility_door_open_after_sunset_turn_off
      - conditions:
          - condition: template
            value_template: "{{ action == 'hold' }}"
        sequence:
          - alias: "Don't turn off the lights when we close the door"
            service: homeassistant.turn_off
            entity_id: automation.utility_door_open_after_sunset_turn_off
    default:
      - alias: 'Toggle the lights by default'
        service: switch.toggle
        data:
          entity_id: switch.garden_lights
      - service: notify.send_message
        target: 
          entity_id: notify.debug_log
        data:
          message: >-
            Utility remote action {{ action }}. Trigger was {{ trigger.id }} new state of {{ trigger.to_state.state }}\n{{ trigger.to_state.attributes }}
