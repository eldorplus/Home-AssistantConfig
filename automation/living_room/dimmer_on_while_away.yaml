id: 'dimmer_on_while_away'
alias: Dimmer on while away
initial_state: 'on'
trigger:
  - platform: state
    entity_id: event.hue_dimmer_action
    to: ~
condition:
  - condition: template
    value_template: >-
      {{ trigger.to_state.attributes.event_type == 'press' }}
  - condition: template
    value_template: "{{ trigger.to_state.attributes.action == 'on_press' }}"
  - condition: state
    entity_id: input_boolean.living_room_occupied
    state: 'off'
action:
  - service: input_boolean.turn_on
    entity_id: input_boolean.living_room_occupied
