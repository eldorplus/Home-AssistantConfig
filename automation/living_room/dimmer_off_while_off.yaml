id: 'dimmer_off_while_off'
alias: Dimmer off while off
initial_state: 'on'
trigger:
  - platform: state
    entity_id: event.hue_dimmer_action
    to: ~
condition:
  - condition: template
    value_template: >-
      {{ trigger.to_state.attributes.event_type == 'press' }}
  - condition: template
    value_template: "{{ trigger.to_state.attributes.action == 'off_press' }}"
  - condition: state
    entity_id: input_boolean.living_room_occupied
    state: 'on'
  - condition: state
    entity_id: input_select.living_room
    state: 'Off'
action:
  - service: input_boolean.turn_off
    entity_id: input_boolean.living_room_occupied
