id: 'dimmer_up_motion'
alias: Dimmer up motion
initial_state: 'on'
trigger:
  - platform: state
    entity_id: event.hue_dimmer_action
    to: ~
condition:
  - condition: template
    value_template: >-
      {{ trigger.to_state.attributes.event_type == 'down_press' }}
  - condition: state
    entity_id: input_select.living_room
    state: 'Motion'
action:
  - service: input_select.select_option
    data:
      entity_id: input_select.living_room
      option: 'Dim'
