id: 'dimmer_on_'
alias: Dimmer on 
initial_state: 'on'
trigger:
  - platform: state
    entity_id: event.hue_dimmer_action
    to: ~
condition:
  - condition: template
    value_template: >-
      {{ trigger.to_state.attributes.event_type == 'press' }}
  - condition: template
    value_template: "{{ trigger.to_state.attributes.action == 'on_press' }}"
  - condition: state
    entity_id: input_boolean.living_room_occupied
    state: 'on'
action:
  - service: input_select.select_option
    data:
      entity_id: input_select.living_room
      option: >-
        {% if is_state('input_select.living_room','Off') %}
          Dim
        {% elif is_state('input_select.living_room','Dim') %}
          Day on
        {% elif is_state('input_select.living_room','Day on') %}
          Night on
        {% else %}
          Night on
        {% endif %}
