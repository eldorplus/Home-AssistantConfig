alias: person4 traveltime
sequence:
  - parallel:
      - if:
          - condition: state
            entity_id: input_boolean.here_travel_time
            state: 'on'
        then: 
          - service: homeassistant.update_entity
            entity_id: sensor.person4s_time_to_home_duration
      - if:
          - condition: state
            entity_id: input_boolean.waze_travel_time
            state: 'on'
        then: 
          - service: homeassistant.update_entity
            entity_id: sensor.person4s_time_to_home_waze
