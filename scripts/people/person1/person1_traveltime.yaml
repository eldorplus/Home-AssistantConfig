alias: person1 traveltime
sequence:
  - parallel:
      - if:
          - condition: state
            entity_id: input_boolean.google_travel_time
            state: 'on'
        then: 
          - service: homeassistant.update_entity
            entity_id: sensor.person1s_time_to_home_by_bus_google
      - if:
          - condition: state
            entity_id: input_boolean.here_travel_time
            state: 'on'
        then: 
          - service: homeassistant.update_entity
            entity_id: 
              - sensor.person1s_time_to_home_by_foot_duration
              - sensor.person1_s_time_to_home_by_bus_duration
              - sensor.person1s_time_to_home_duration
      - if:
          - condition: state
            entity_id: input_boolean.waze_travel_time
            state: 'on'
        then: 
          - service: homeassistant.update_entity
            entity_id: sensor.person1s_time_to_home_waze
